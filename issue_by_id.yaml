openapi: 3.0.0
paths:
  /public_api/v1/issue/{issue-id}:
    post:
      tags:
      - Issues
      summary: Update existing issue
      description: "Update an existing issue in the system. **Users can only update one issue at a time.**   - At least one
         of the following fields is **mandatory**:     - severity   - status **Required license:** Cortex Cloud Runtime
         Security or Cortex Cloud Posture Management"
      operationId: updateIssue
      parameters:
      - name: issue-id
        in: path
        description: Numeric ID of the user to get
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_data:
                  type: object
                  properties:
                    update_data:
                      $ref: '#/components/schemas/UpdateIssue'
      responses:
        '204':
          description: Issues updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
